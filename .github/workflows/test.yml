name: Test del Proyecto
on:
 push:
 branches:
 - main
jobs:
 test:
 runs-on: ubuntu-latest
 steps:
 - name: Descargar repositorio
 uses: actions/checkout@v4
 - name: Instalar Node
 uses: actions/setup-node@v4
 with:
 node-version: 20
 - name: Instalar dependencias
 run: npm install
 - name: Ejecutar test
 run: npm test